services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dark-patterns-frontend
    tty: true
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dp-frontend.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.dp-frontend.entrypoints=websecure"
      - "traefik.http.routers.dp-frontend.tls.certresolver=myresolver"
      # Forward requests to the correct port on the container
      - "traefik.http.services.dp-frontend.loadbalancer.server.port=${APP_PORT}"
    ports:
      - "${APP_PORT}:3000"
    volumes:
      - ./src:/usr/src/app/dark-patterns/src
networks:
  traefik-public:
    external: true